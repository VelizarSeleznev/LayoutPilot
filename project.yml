name: LayoutPilot
options:
  bundleIdPrefix: com.velizard
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "Apple Development: velizar.seleznev@gmail.com (VMQ79QRJFB)"
    DEVELOPMENT_TEAM: "KML84LMMXZ"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.4
targets:
  LayoutPilotCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/LayoutPilotCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velizard.LayoutPilotCore
        DEFINES_MODULE: YES
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
    info:
      path: Sources/LayoutPilotCore/Info.plist
      properties:
        CFBundleName: LayoutPilotCore
        CFBundleIdentifier: com.velizard.LayoutPilotCore
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: FMWK
  LayoutPilot:
    type: application
    platform: macOS
    sources:
      - path: Sources/LayoutPilotApp
    dependencies:
      - target: LayoutPilotCore
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velizard.LayoutPilot
        INFOPLIST_KEY_CFBundleDisplayName: LayoutPilot
        INFOPLIST_KEY_CFBundleName: LayoutPilot
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_NSHighResolutionCapable: true
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        VALIDATE_PRODUCT: NO
        SWIFTUI_PREVIEW_DEVICE: "Apple Mac"
    info:
      path: Sources/LayoutPilotApp/Info.plist
      properties:
        CFBundleName: LayoutPilot
        CFBundleIdentifier: com.velizard.LayoutPilot
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSAppleEventsUsageDescription: LayoutPilot needs Automation permission to retrieve the active tab URL from your browser to apply website-specific layout rules.
        SUFeedURL: https://velizarseleznev.github.io/LayoutPilot/appcast.xml
        SUPublicEDKey: kqP2g56I7yz/ruSxLBTKSFAKRhXefII0cwo9u1agIU8=
        SUEnableAutomaticChecks: true
        SUAutomaticallyUpdate: true
        SUAllowsAutomaticUpdates: true
        SUScheduledCheckInterval: 21600
        SUScheduledImpatientCheckInterval: 86400
  LayoutPilotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Sources/LayoutPilotApp/Resources/friend-prank.json
        buildPhase: resources
    dependencies:
      - target: LayoutPilotCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.velizard.LayoutPilotTests
schemes:
  LayoutPilot:
    build:
      targets:
        LayoutPilot: all
        LayoutPilotCore: all
    test:
      targets:
        - LayoutPilotTests
